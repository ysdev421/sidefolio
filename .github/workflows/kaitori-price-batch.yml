name: 買取価格一括取得バッチ

on:
  schedule:
    # 毎日 17:00 UTC = 日本時間 02:00
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（Firestoreに書き込まない）'
        type: boolean
        default: true

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージインストール
        run: npm ci

      - name: 買取価格バッチ実行
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/kaitori-price-batch.cjs --interval=7000 ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
